services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: tasknova
      POSTGRES_PASSWORD: tasknova
      POSTGRES_DB: tasknova
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tasknova"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://tasknova:tasknova@db:5432/tasknova
      JWT_SECRET: change-me-in-production-jwt-secret-key
      JWT_REFRESH_SECRET: change-me-in-production-refresh-secret-key
      PORT: "3000"
      FRONTEND_URL: http://localhost:5174
      UPLOAD_DIR: /app/uploads
      NODE_ENV: development
    ports:
      - "3003:3000"
    volumes:
      - uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5174:80"

volumes:
  db_data:
  uploads:
