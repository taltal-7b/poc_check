services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: tasknova
      POSTGRES_PASSWORD: tasknova
      POSTGRES_DB: tasknova
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tasknova"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://tasknova:tasknova@db:5432/tasknova
      JWT_SECRET: change-me-in-production-jwt-secret-key
      JWT_REFRESH_SECRET: change-me-in-production-refresh-secret-key
      PORT: "3000"
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5174}
      SMTP_HOST: ${SMTP_HOST:-localhost}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@tasknova.local}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5-nano}
      AI_DUE_SUMMARY_ENABLED: ${AI_DUE_SUMMARY_ENABLED:-true}
      AI_DUE_SUMMARY_TIME_ZONE: ${AI_DUE_SUMMARY_TIME_ZONE:-Asia/Tokyo}
      AI_DUE_SUMMARY_HOUR: ${AI_DUE_SUMMARY_HOUR:-7}
      AI_DUE_SUMMARY_LOOKAHEAD_DAYS: ${AI_DUE_SUMMARY_LOOKAHEAD_DAYS:-3}
      AI_DUE_SUMMARY_MAX_COMMENTS: ${AI_DUE_SUMMARY_MAX_COMMENTS:-20}
      AI_DUE_SUMMARY_MAX_INPUT_CHARS: ${AI_DUE_SUMMARY_MAX_INPUT_CHARS:-20000}
      AI_DUE_SUMMARY_MOCK_OPENAI: ${AI_DUE_SUMMARY_MOCK_OPENAI:-false}
      AI_DUE_SUMMARY_DRY_RUN: ${AI_DUE_SUMMARY_DRY_RUN:-false}
      AI_DUE_SUMMARY_PROMPT: ${AI_DUE_SUMMARY_PROMPT:-}
      UPLOAD_DIR: /app/uploads
      NODE_ENV: development
    ports:
      - "3003:3000"
    volumes:
      - uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5174:80"

volumes:
  db_data:
  uploads:
