name: Deploy

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}
  IMAGE_TAG: ${{ github.event.workflow_run.head_sha || github.sha }}

jobs:
  build-and-push:
    name: Build and push images
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.IMAGE_TAG }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/backend:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_PREFIX }}/backend:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/frontend:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_PREFIX }}/frontend:latest

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure SSH
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${DEPLOY_PORT:-22}" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Copy compose file
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail
          SSH_PORT="${DEPLOY_PORT:-22}"
          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$DEPLOY_PATH'"
          scp -i ~/.ssh/deploy_key -P "$SSH_PORT" docker-compose.prod.yml "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/docker-compose.yml"

      - name: Pull images and restart services
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          IMAGE_PREFIX: ${{ env.IMAGE_PREFIX }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          FRONTEND_BIND: ${{ secrets.FRONTEND_BIND }}
          FRONTEND_PORT: ${{ secrets.FRONTEND_PORT }}
          BACKEND_BIND: ${{ secrets.BACKEND_BIND }}
          BACKEND_PORT: ${{ secrets.BACKEND_PORT }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          set -euo pipefail
          SSH_PORT="${DEPLOY_PORT:-22}"
          deploy_env="$(mktemp)"
          cat > "$deploy_env" <<EOF
          IMAGE_PREFIX=$IMAGE_PREFIX
          IMAGE_TAG=$IMAGE_TAG
          POSTGRES_USER=${POSTGRES_USER:-tasknova}
          POSTGRES_PASSWORD=$POSTGRES_PASSWORD
          POSTGRES_DB=${POSTGRES_DB:-tasknova}
          JWT_SECRET=$JWT_SECRET
          JWT_REFRESH_SECRET=$JWT_REFRESH_SECRET
          FRONTEND_URL=$FRONTEND_URL
          SMTP_HOST=${SMTP_HOST:-}
          SMTP_PORT=${SMTP_PORT:-587}
          SMTP_USER=${SMTP_USER:-}
          SMTP_PASS=${SMTP_PASS:-}
          SMTP_FROM=${SMTP_FROM:-}
          OPENAI_API_KEY=${OPENAI_API_KEY:-}
          FRONTEND_BIND=${FRONTEND_BIND:-127.0.0.1}
          FRONTEND_PORT=${FRONTEND_PORT:-8081}
          BACKEND_BIND=${BACKEND_BIND:-127.0.0.1}
          BACKEND_PORT=${BACKEND_PORT:-3000}
          EOF
          scp -i ~/.ssh/deploy_key -P "$SSH_PORT" "$deploy_env" "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/.env"
          rm -f "$deploy_env"
          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            'bash -s' -- "$DEPLOY_PATH" "${GHCR_USERNAME:-}" "${GHCR_TOKEN:-}" <<'REMOTE'
          set -euo pipefail
          DEPLOY_PATH="$1"
          GHCR_USERNAME="${2:-}"
          GHCR_TOKEN="${3:-}"
          cd "$DEPLOY_PATH"
          if [ -n "$GHCR_USERNAME" ] && [ -n "$GHCR_TOKEN" ]; then
            printf '%s\n' "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
          fi
          docker compose pull
          docker compose up -d --remove-orphans
          docker image prune -f
          REMOTE
